<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
max-width:430px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
font-size:22px;
font-weight:700;
}

.profile-section{
padding:0 18px;
}

.profile-top{
display:flex;
gap:20px;
align-items:center;
}

.profile-pic{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:2px solid #222;
}

.stats{
display:flex;
flex:1;
justify-content:space-around;
text-align:center;
}

.stat-number{
font-size:24px;
font-weight:700;
}

.stat-label{
font-size:14px;
color:#cfcfcf;
}

.name{
margin-top:15px;
font-size:22px;
font-weight:600;
}

.bio{
margin-top:8px;
font-size:14px;
color:#d6d6d6;
line-height:1.5;
}

.dashboard{
margin-top:15px;
background:#262626;
padding:15px;
border-radius:14px;
font-size:14px;
}

.buttons{
display:flex;
gap:8px;
margin-top:15px;
}

.buttons button{
flex:1;
padding:12px;
background:#262626;
border:none;
color:white;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

.tabs{
display:flex;
justify-content:center;
gap:80px;
margin-top:20px;
padding-bottom:12px;
border-bottom:1px solid #222;
font-size:24px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
background:#000;
margin-top:2px;
}

.grid a{
display:block;
aspect-ratio:1/1;
overflow:hidden;
}

.grid img{
width:100%;
height:100%;
object-fit:cover;
transition:0.3s;
}

.grid img:hover{
transform:scale(1.05);
}

.footer-space{
height:50px;
}

</style>
</head>
